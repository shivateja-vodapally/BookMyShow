spring.jpa.properties.hibernate.format-sql=true
logging.level.org.hibernate.SQL=DEBUG
spring.jpa.show-sql=true
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=SQL_BMS;encrypt=false
